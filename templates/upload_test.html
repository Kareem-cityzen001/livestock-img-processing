<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Upload Test</title>
    <style>
        body { font-family: Arial; margin: 20px; background: #f5f5f5; }
        .container { max-width: 600px; margin: 0 auto; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        h1 { color: #333; }
        .input-group { margin: 20px 0; }
        label { display: block; margin-bottom: 8px; font-weight: bold; }
        input[type="file"], textarea, button { width: 100%; padding: 10px; margin-bottom: 10px; border: 1px solid #ddd; border-radius: 4px; font-size: 14px; }
        textarea { resize: vertical; min-height: 100px; }
        button { background: #1a472a; color: white; cursor: pointer; }
        button:hover { background: #0f2a1a; }
        .result { margin-top: 20px; padding: 15px; border-radius: 4px; }
        .success { background: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .error { background: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
        #logs { background: #f8f9fa; border: 1px solid #dee2e6; padding: 10px; border-radius: 4px; max-height: 300px; overflow-y: auto; font-size: 12px; line-height: 1.4; }
        .log-line { margin: 4px 0; }
        .log-debug { color: #0066cc; }
        .log-success { color: #28a745; }
        .log-error { color: #dc3545; }
    </style>
</head>
<body>
<div class="container">
    <h1>🚀 Upload Test Panel</h1>
    
    <div class="input-group">
        <label>Select Image:</label>
        <input type="file" id="imageInput" accept="image/*">
    </div>
    
    <div class="input-group">
        <label>Behavior Description (optional):</label>
        <textarea id="behaviorInput" placeholder="Describe animal symptoms..."></textarea>
    </div>
    
    <button onclick="testUpload()">📤 Test Upload</button>
    <button onclick="clearLogs()" style="background: #666;">Clear Logs</button>
    
    <div id="result"></div>
    
    <h3>📋 Request/Response Logs:</h3>
    <div id="logs"></div>
</div>

<script>
    let selectedFile = null;
    
    document.getElementById('imageInput').addEventListener('change', function() {
        selectedFile = this.files[0];
        if (selectedFile) {
            addLog(`File selected: ${selectedFile.name} (${(selectedFile.size / 1024).toFixed(1)} KB)`, 'success');
        }
    });
    
    function addLog(message, type = 'debug') {
        const logsDiv = document.getElementById('logs');
        const line = document.createElement('div');
        line.className = `log-line log-${type}`;
        const timestamp = new Date().toLocaleTimeString();
        line.textContent = `[${timestamp}] ${message}`;
        logsDiv.appendChild(line);
        logsDiv.scrollTop = logsDiv.scrollHeight;
    }
    
    function clearLogs() {
        document.getElementById('logs').innerHTML = '';
        document.getElementById('result').innerHTML = '';
    }
    
    async function testUpload() {
        const resultDiv = document.getElementById('result');
        resultDiv.innerHTML = '';
        
        if (!selectedFile) {
            addLog('No file selected!', 'error');
            resultDiv.innerHTML = '<div class="result error">❌ Please select an image first</div>';
            return;
        }
        
        addLog('Starting upload test...', 'debug');
        
        const formData = new FormData();
        formData.append('image', selectedFile);
        
        const behavior = document.getElementById('behaviorInput').value.trim();
        if (behavior) {
            formData.append('behavior_description', behavior);
            addLog(`Behavior: ${behavior.substring(0, 50)}...`, 'debug');
        }
        
        try {
            addLog('Sending request to http://127.0.0.1:5000/upload...', 'debug');
            
            const response = await fetch('http://127.0.0.1:5000/upload', {
                method: 'POST',
                body: formData,
                headers: { 'X-Requested-With': 'XMLHttpRequest' }
            });
            
            addLog(`Response received: ${response.status} ${response.statusText}`, 'debug');
            
            const text = await response.text();
            
            if (response.status === 200) {
                try {
                    const data = JSON.parse(text);
                    addLog('✅ Response parsed as JSON', 'success');
                    
                    resultDiv.innerHTML = `
                        <div class="result success">
                            <h3>✅ Upload Successful!</h3>
                            <p><strong>Diagnosis:</strong> ${data.Diagnosis || data.disease || 'N/A'}</p>
                            <p><strong>Confidence:</strong> ${data.Confidence || data.confidence || 'N/A'}</p>
                            <p><strong>Status:</strong> ${data.Status || 'N/A'}</p>
                        </div>
                    `;
                } catch (e) {
                    addLog(`❌ JSON parse error: ${e.message}`, 'error');
                    resultDiv.innerHTML = `<div class="result error">❌ Server returned invalid JSON</div>`;
                }
            } else {
                addLog(`❌ Server error: ${response.status}`, 'error');
                resultDiv.innerHTML = `<div class="result error">❌ Server error: ${text.substring(0, 200)}</div>`;
            }
            
        } catch (error) {
            addLog(`❌ Error: ${error.message}`, 'error');
            resultDiv.innerHTML = `<div class="result error">
                <h3>❌ Upload Failed</h3>
                <p><strong>Error:</strong> ${error.message}</p>
                <p><strong>Details:</strong> Make sure Flask server is running: <code>python app.py</code></p>
            </div>`;
        }
    }
</script>
</body>
</html>
